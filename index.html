<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Calor - Incendios</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #000; }
        
        /* Estilo sutil para los puntos de fuego */
        .leaflet-interactive { cursor: default !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // Inicializar mapa centrado en España sin controles innecesarios
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: true
        }).setView([40.4637, -3.7492], 6);

        // Capa oscura minimalista
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; NASA FIRMS | CARTO'
        }).addTo(map);

        const csvUrl = 'https://firms.modaps.eosdis.nasa.gov/api/area/csv/326446a2a9467426f908bf9091476adb/VIIRS_SNPP_NRT/world/2/2026-04-27';

        async function loadFires() {
            try {
                const response = await fetch(csvUrl);
                const csvData = await response.text();
                
                Papa.parse(csvData, {
                    header: true,
                    dynamicTyping: true,
                    complete: function(results) {
                        results.data.forEach(point => {
                            if (point.latitude && point.longitude) {
                                L.circleMarker([point.latitude, point.longitude], {
                                    radius: 3,
                                    fillColor: "#ff4400",
                                    color: "#ff0000",
                                    weight: 0.5,
                                    opacity: 0.8,
                                    fillOpacity: 0.7,
                                    interactive: false // Desactiva clics y eventos
                                }).addTo(map);
                            }
                        });
                    }
                });
            } catch (e) {
                console.error("Error al obtener datos");
            }
        }

        loadFires();
    </script>
</body>
</html>
