<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Incendios</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Elimina márgenes por defecto y hace que el mapa ocupe todo el espacio disponible */
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111; /* Fondo oscuro mientras carga */
            overflow: hidden;
        }
        /* Oculta el borde de enfoque que añade a veces Leaflet */
        #map:focus {
            outline: none;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Inicializar mapa centrado en España y desactivar los botones de control (+/-)
        const map = L.map('map', {
            zoomControl: false, // Quita los botones de zoom para máxima limpieza
            attributionControl: false // Oculta el texto de créditos inferior para evitar barras de scroll
        }).setView([40.416775, -3.703790], 6);

        // 2. Capa base oscura (CartoDB Dark Matter) para que resalten los fuegos
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18
        }).addTo(map);

        // 3. Capa WMS de Copernicus (EFFIS) con los focos activos de satélites
        L.tileLayer.wms('https://maps.effis.emergency.copernicus.eu/effis', {
            layers: 'modis.hs,viirs.hs', // Focos activos detectados por MODIS y VIIRS
            format: 'image/png',
            transparent: true
        }).addTo(map);
    </script>
</body>
</html>
