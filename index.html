<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Incendios España</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar mapa centrado en España
        const map = L.map('map').setView([40.416775, -3.703790], 6);

        // Capa base oscura (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18
        }).addTo(map);

        // Clave MAP_KEY que venía en tu URL anterior
        const mapKey = 'e25ca48fbff6180dfd30666014e768e9';

        // Capa WMS de la NASA (FIRMS) - Carga los puntos directamente en ROJO y evita los problemas de CORS
        L.tileLayer.wms('https://firms.modaps.eosdis.nasa.gov/wms/key/' + mapKey, {
            layers: 'fires_viirs_snpp_24', // Incendios detectados por VIIRS en las últimas 24 horas
            format: 'image/png',
            transparent: true,
            version: '1.1.1',
            opacity: 0.9
        }).addTo(map);
    </script>
</body>
</html>
