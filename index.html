<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Incendios Activos España</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar mapa centrado en España
        const map = L.map('map').setView([40.416775, -3.703790], 6);

        // Capa base oscura para que resalte el rojo
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18
        }).addTo(map);

        // URL del GeoJSON de la NASA (FIRMS) para incendios de las últimas 24h en la región de Europa
        // Usamos el satélite VIIRS (sugoomi-npp), que tiene una resolución excelente de 375m
        const urlIncendios = 'https://firms.modaps.eosdis.nasa.gov/api/area/geojson/e25ca48fbff6180dfd30666014e768e9/VIIRS_SNPP_NRT/europe/1';

        fetch(urlIncendios)
            .then(response => response.json())
            .then(data => {
                // Filtrar los datos para que solo pinte los que caen dentro de España (cuadro delimitador aproximado)
                const puntosEspana = {
                    type: "FeatureCollection",
                    features: data.features.filter(f => {
                        const lon = f.geometry.coordinates[0];
                        const lat = f.geometry.coordinates[1];
                        // Coordenadas aproximadas de España (incluyendo Baleares y Canarias)
                        return (lat > 27 && lat < 44 && lon > -18 && lon < 5);
                    })
                };

                // Añadir los puntos al mapa y darles estilo ROJO
                L.geoJSON(puntosEspana, {
                    pointToLayer: function (feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 5,         // Tamaño del punto
                            fillColor: "#ff2200", // Rojo fuego brillante
                            color: "#ff6600",     // Borde ligeramente anaranjado para dar efecto de calor
                            weight: 1,
                            opacity: 0.8,
                            fillOpacity: 0.9
                        });
                    }
                }).addTo(map);
            })
            .catch(err => console.error("Error cargando los datos de incendios: ", err));
    </script>
</body>
</html>
